name: Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check site health
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "https://zolai.peterlianpi.site/api/cron/health?secret=${{ secrets.CRON_SECRET }}")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Alert on failure
        if: failure()
        run: |
          MESSAGE="🚨 <b>Zolai DOWN</b>%0AHTTP ${{ steps.check.outputs.status }}%0ATime: $(date -u '+%Y-%m-%d %H:%M UTC')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MESSAGE}&parse_mode=HTML"

      - name: Alert on recovery
        if: success()
        run: |
          # Only send recovery if previous run failed (GitHub doesn't track this natively,
          # so we rely on the app's own recovery alert system via /api/cron/health)
          echo "Site is healthy ✅"
