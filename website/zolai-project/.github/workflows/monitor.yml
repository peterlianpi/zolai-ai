name: Monitor — Zolai

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min (GitHub minimum is 5, but 10 is more reliable)
  workflow_dispatch:

jobs:
  health:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Check site
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://zolai.space/api/cron/health?secret=${{ secrets.CRON_SECRET }}")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Alert down
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🚨 <b>Zolai DOWN</b>%0AHTTP ${{ steps.check.outputs.status }}%0A$(date -u '+%Y-%m-%d %H:%M UTC')" \
            -d parse_mode="HTML" || true
