version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  # Optional: run CLI tools interactively
  cli:
    build: .
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    entrypoint: ["zolai"]
    profiles: ["cli"]
